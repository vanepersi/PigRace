name: BaconBolt
version: '${version}'
main: dev.genesi.baconbolt.BaconBoltPlugin
api-version: '26.1'
authors: [Genesi]
description: Bacon Bolt — eat a carrot, shrink onto a pig, race the lounge trail. Max 4.

commands:
  baconbolt:
    description: Join or leave a Bacon Bolt race.
    usage: /baconbolt <join|leave|info|help>
    aliases: [bb, bacon]
  baconboltadmin:
    description: Admin setup for Bacon Bolt lounges and join items.
    usage: /baconboltadmin <subcommand>
    aliases: [bbadmin, bba]
    permission: baconbolt.admin

permissions:
  baconbolt.use:
    description: Join and leave Bacon Bolt races.
    default: true
  baconbolt.admin:
    description: Manage arenas, paths, join items, and force control.
    default: op
