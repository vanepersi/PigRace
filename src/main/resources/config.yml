# PigRace — lounge pig races for Paper 26.1.2+
#
# Eat a join carrot → shrink animation + sit on a pig.
# Race starts once 2+ players join. Follow the lounge trail.
# Mario Kart–style rotating power-up blocks spin an effect on your scoreboard.

max-players: 4
min-players: 2

# Lobby wait once min-players is reached (short — race can begin quickly)
lobby-countdown-seconds: 8
start-countdown-seconds: 3
race-timeout-seconds: 180

# Final scale after the shrink animation (1.0 = normal)
player-scale: 0.28
pig-scale: 0.55

# Shrink-onto-pig join animation
join-animation:
  duration-ticks: 30
  particle: CLOUD
  sound: ENTITY_PLAYER_LEVELUP

# Players ride pigs. Movement is driven by plugin code from WASD input so
# tiny player scale cannot break steering (vanilla carrot-stick often fails when scaled).
ride-pigs: true
# Keep remounting if they fall off mid-race
auto-remount: true

# Pig drive (blocks per tick-ish via velocity). Works at any player/pig scale.
pig-drive:
  # Forward speed while holding W
  speed: 0.42
  # Sprint multiplier (Ctrl)
  sprint-multiplier: 1.35
  # Backward speed
  reverse-speed: 0.22
  # Jump strength when on ground + space
  jump-strength: 0.48
  # Face the player's look yaw every tick
  turn-with-look: true

finish-requires-pig: false
finish-check-radius-fallback: 2.5
teleport-on-end: true

# ---------------------------------------------------------------------------
# Join carrot — EAT this to join (not click)
# Admins: /pigraceadmin givejoinitem
# ---------------------------------------------------------------------------
join-item:
  material: CARROT
  display-name: "&6&lPig Race Carrot"
  lore:
    - "&7Eat to join the lounge pig race!"
    - "&8Needs 2 players to start"
  custom-model-data: 0
  item-model: ""
  arena: lounge

# Carrot on a stick given while racing (steers the pig)
steer-item:
  material: CARROT_ON_A_STICK
  display-name: "&d&lPig Stick"
  lore:
    - "&7WASD to drive your pig!"
    - "&7Space to jump"

# Trail particles along path waypoints
trail:
  enabled: true
  particle: END_ROD
  density: 4
  y-offset: 0.35

# ---------------------------------------------------------------------------
# Mario Kart–style power-up boxes
# ---------------------------------------------------------------------------
powerups:
  enabled: true
  # Rotating display block
  material: GOLD_BLOCK
  display-scale: 0.55
  rotate-degrees-per-tick: 6
  bob-amplitude: 0.12
  collect-radius: 1.35
  # Seconds before a collected box respawns
  respawn-seconds: 8
  # Scoreboard roulette
  spin:
    duration-ticks: 40
    tick-interval: 2
    title: "&6&lITEM BOX"
  effects:
    speed:
      display: "&a&lSPEED"
      weight: 25
      potion: SPEED
      amplifier: 1
      duration-ticks: 100
    blindness:
      display: "&8&lBLINDNESS"
      weight: 15
      potion: BLINDNESS
      amplifier: 0
      duration-ticks: 60
    slowness:
      display: "&9&lSLOW"
      weight: 15
      potion: SLOWNESS
      amplifier: 1
      duration-ticks: 80
    jump:
      display: "&e&lJUMP"
      weight: 15
      potion: JUMP_BOOST
      amplifier: 2
      duration-ticks: 80
    boost:
      display: "&b&lBOOST"
      weight: 20
      potion: SPEED
      amplifier: 3
      duration-ticks: 40
    nausea:
      display: "&2&lDIZZY"
      weight: 10
      potion: NAUSEA
      amplifier: 0
      duration-ticks: 100

action-bar-waiting: "&dPig Race &8| &f{count}/{max} &7waiting &8| &e{seconds}s"
action-bar-countdown: "&dGet ready! &e{seconds}"
action-bar-racing: "&dPig Race &8| &e{time}s &8| &fPath &b{path}"

stats:
  provider: none
  local:
    file: stats.yml
  http:
    enabled: false
    url: "https://api.example.com/v1/pigrace/results"
    method: POST
    auth-header: ""
    headers: {}
    timeout-seconds: 5
    include-placements: true

messages:
  prefix: "&8[&dPig Race&8] &r"
  no-permission: "&cYou don't have permission."
  players-only: "&cOnly players can use this command."
  arena-not-found: "&cArena &e{arena}&c was not found."
  arena-not-ready: "&cArena &e{arena}&c needs a lobby, at least one path with spawns + finish."
  arena-full: "&cThat race is full (&e{max}&c players)."
  already-playing: "&cYou are already in a pig race."
  not-playing: "&cYou are not in a pig race."
  joined: "&aJoined &e{arena}&a! &7({count}/{max}) &8— eat a carrot to join!"
  joining-anim: "&dShrinking... hop on!"
  need-more-players: "&eWaiting for &f{needed}&e more player(s) to start..."
  left: "&eYou left the pig race."
  lobby-start: "&aRace starting in &e{seconds}&a seconds!"
